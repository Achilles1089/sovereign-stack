name: SovereignAI
options:
  bundleIdPrefix: com.sovereign
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  vapor:
    url: https://github.com/vapor/vapor.git
    from: 4.89.0

targets:
  SovereignAI:
    type: application
    platform: iOS
    sources:
      - path: SovereignAI
        excludes:
          - Info.plist
    info:
      path: SovereignAI/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hschaheen.sovereignai
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks/llama.xcframework/ios-arm64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks/llama.xcframework/ios-arm64/llama.framework/Headers"
    dependencies:
      - package: vapor
        product: Vapor
      - framework: Frameworks/llama.xcframework
        embed: true
    postBuildScripts: []
