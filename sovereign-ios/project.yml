name: SovereignAI
options:
  bundleIdPrefix: com.sovereign
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Vapor:
    url: https://github.com/vapor/vapor.git
    from: 4.89.0

targets:
  SovereignAI:
    type: application
    platform: iOS
    sources: [SovereignAI]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sovereign.ai
        INFOPLIST_FILE: SovereignAI/Info.plist
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    dependencies:
      - package: Vapor
